<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Gemini API - GrowSafe</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f8fafc; color: #334155; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #3b82f6; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
        #hasil-ai { margin-top: 20px; padding: 15px; background: #f1f5f9; border-radius: 8px; white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍄 Konsultasi Penyakit Jamur AI</h2>
    <p>Klik tombol di bawah untuk meminta saran dari Gemini terkait masalah Black Mold pada jamur tiram.</p>
    
    <button id="btn-tanya" onclick="mintaSaran()">Tanya Gemini AI</button>
    
    <div id="hasil-ai"><i>Hasil rekomendasi akan muncul di sini...</i></div>
</div>

<script>
    // 1. HARDCODE API KEY ANDA DI SINI UNTUK TESTING
    const API_KEY = "AIzaSyDY77yQFZYnsDRZ6mCOWABQthcybhmaYH8";

    async function mintaSaran() {
        const hasilDiv = document.getElementById("hasil-ai");
        const btn = document.getElementById("btn-tanya");
        
        // Ubah tampilan saat loading
        hasilDiv.innerHTML = "⏳ <i>Gemini sedang berpikir dan mengetik jawaban...</i>";
        btn.disabled = true;

        // 2. Teks / Pertanyaan yang ingin diajukan ke Gemini
        const pertanyaan = "Saya petani jamur tiram. Baglog jamur saya muncul bercak hitam (Black Mold) dan pertumbuhannya terhambat. Berikan 3 solusi penanganannya dengan bahasa yang singkat dan mudah dipahami.";

        // 3. URL Endpoint Resmi Gemini (Menggunakan Model 2.5 Flash yang terbaru)
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

        try {
            // 4. Melakukan HTTP Request (Fetch) ke Google
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: pertanyaan }] }]
                })
            });

            const data = await response.json();

            // 5. Cek apakah respon berhasil
            if(response.ok) {
                // Menarik teks balasan dari struktur JSON Gemini
                let teksBalasan = data.candidates[0].content.parts[0].text;
                // Mengubah format baris baru agar rapi di HTML
                teksBalasan = teksBalasan.replace(/\n/g, '<br>');
                
                hasilDiv.innerHTML = "<b>✨ Rekomendasi Gemini:</b><br><br>" + teksBalasan;
            } else {
                hasilDiv.innerHTML = "❌ <b>Terjadi Error:</b> " + data.error.message;
            }

        } catch (error) {
            hasilDiv.innerHTML = "❌ <b>Gagal terhubung ke internet atau API Google.</b>";
        }

        btn.disabled = false;
    }
</script>

</body>
</html>
